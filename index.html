<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniViT Visual Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #3a7bd5;
            background: rgba(58, 123, 213, 0.1);
        }

        .upload-area input[type="file"] { display: none; }

        .upload-area p {
            font-size: 1.2rem;
            color: #ccc;
        }

        .upload-area .icon { font-size: 3rem; margin-bottom: 10px; }

        #preview-container {
            margin-top: 30px;
            text-align: center;
        }

        #preview-container img {
            max-width: 200px;
            border-radius: 12px;
            border: 3px solid #3a7bd5;
        }

        button {
            margin-top: 20px;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader {
            margin-top: 30px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00d2ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #results {
            margin-top: 40px;
            width: 100%;
            max-width: 900px;
        }

        #results h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .results-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            width: 160px;
            transition: transform 0.2s;
        }

        .result-card:hover { transform: translateY(-5px); }

        .result-card img {
            width: 128px;
            height: 128px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .result-card .label {
            font-weight: bold;
            font-size: 1rem;
            color: #00d2ff;
        }

        .result-card .score {
            font-size: 0.85rem;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <h1>MiniViT Visual Search</h1>
    <p class="subtitle">Upload an image to find similar images using self-supervised learning</p>

    <div class="upload-area" id="dropZone">
        <div class="icon">📁</div>
        <p>Click or drag an image here</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="preview-container"></div>

    <button id="searchBtn" disabled>🔍 Search Similar Images</button>

    <div class="loader" id="loader"></div>

    <div id="results"></div>

    <script>
        // =============================================
        // CHANGE THIS to your backend API URL!
        // If running locally: "http://localhost:8000"
        // If on Hugging Face: "https://YOUR_USERNAME-YOUR_SPACE.hf.space"
        // If on Render/Railway: "https://your-app-name.onrender.com"
        // =============================================
        const API_URL = "https://huggingface.co/spaces/Conkey01/minivit-visual-search";

        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");
        const searchBtn = document.getElementById("searchBtn");
        const loader = document.getElementById("loader");
        const resultsDiv = document.getElementById("results");
        const previewContainer = document.getElementById("preview-container");

        let selectedFile = null;

        // Click to upload
        dropZone.addEventListener("click", () => fileInput.click());

        // Drag and drop
        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "#00d2ff";
        });
        dropZone.addEventListener("dragleave", () => {
            dropZone.style.borderColor = "rgba(255,255,255,0.2)";
        });
        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "rgba(255,255,255,0.2)";
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener("change", () => {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            searchBtn.disabled = false;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewContainer.innerHTML = `
                    <p style="margin-bottom:10px; color:#aaa;">Your Image:</p>
                    <img src="${e.target.result}">
                `;
            };
            reader.readAsDataURL(file);
            resultsDiv.innerHTML = "";
        }

        // Search button
        searchBtn.addEventListener("click", async () => {
            if (!selectedFile) return;

            searchBtn.disabled = true;
            loader.style.display = "block";
            resultsDiv.innerHTML = "";

            const formData = new FormData();
            formData.append("file", selectedFile);

            try {
                const response = await fetch(`${API_URL}/search`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                let html = `<h2>Top 5 Matches</h2><div class="results-grid">`;
                data.results.forEach((item) => {
                    html += `
                        <div class="result-card">
                            <img src="${item.image}">
                            <div class="label">${item.class}</div>
                            <div class="score">Score: ${item.score}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                resultsDiv.innerHTML = html;

            } catch (err) {
                resultsDiv.innerHTML = `<p style="color: #ff6b6b; text-align:center;">
                    Error connecting to API. Make sure your backend is running at ${API_URL}</p>`;
            }

            loader.style.display = "none";
            searchBtn.disabled = false;
        });
    </script>
</body>
</html>
